<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APPET - Perfil</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" /> 
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/perfil.css" />
</head>
<body>

 <!-- layout principal: sidebar + contenido lado a lado -->
  <div class="layout">

    <!-- sidebar de navegacion -->
    <aside class="sidebar">

      <!-- usuuario en la parte de arriba -->
      <div class="sidebar-usuario">
        <div class="avatar"><i class="fa-solid fa-user"></i></div>
        <span class="usuario-nombre">Bienvenido</span>
      </div>
      <hr class="divisor" />
      <!-- links de navegación, "activo" que marca la página actual -->
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <i class="fa-solid fa-house"></i> Inicio
        </a>
        <a href="perfil.html" class="nav-item activo">
          <i class="fa-solid fa-circle-user"></i> Perfil
        </a>
        <a href="mis-mascotas.html" class="nav-item">
          <i class="fa-solid fa-paw"></i> Mis mascotas
        </a>
        <a href="registrar-mascota.html" class="nav-item">
          <i class="fa-solid fa-plus"></i> Registrar mascota
        </a>
      </nav>

      <!-- botón de cerrar sesión -->
      <div class="sidebar-footer">
        <button class="btn-logout" id="btn-logout">
          <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
        </button>
      </div>
    </aside>

    <!-- contenido de la pagina-->
    <main class="contenido">

      <!-- taarjeta centrada con el formulario -->
      <div class="card border-0 shadow-sm rounded-4 mx-auto" style="max-width:600px;">
        <div class="card-body p-5">

          <h1 class="fw-bold mb-5 titulo fs-4 text-center">Actualizar perfil</h1>

           <!-- novalidate desactiva la validación del navegador, la validación la hace perfil.js -->
          <form id="form-perfil" novalidate class="d-flex flex-column gap-3">

            <div>
              <label for="celular" class="form-label fw-normal" style="color:#0067a7;">Actualizar número de celular</label>
              <input type="tel" id="celular" class="form-control" placeholder="300 123 4567" />
              <span class="error" id="error-celular"></span>
            </div>

            <div>
              <label for="direccion" class="form-label fw-normal" style="color:#0067a7;">Actualizar dirección</label>
              <input type="text" id="direccion" class="form-control" placeholder="Calle 10 # 20-30" />
              <span class="error" id="error-direccion"></span>
            </div>

            <div>
              <label for="password-actual" class="form-label fw-normal" style="color:#0067a7;">Contraseña actual</label>
              <input type="password" id="password-actual" class="form-control" placeholder="Tu contraseña actual" />
              <span class="error" id="error-password-actual"></span>
            </div>

            <div>
              <label for="password-nueva" class="form-label fw-normal" style="color:#0067a7;">Crear contraseña nueva</label>
              <input type="password" id="password-nueva" class="form-control" placeholder="Mín. 8 caracteres, 1 mayúscula, 1 número" />
              <span class="error" id="error-password-nueva"></span>
            </div>

            <div>
              <label for="password-confirmar" class="form-label fw-normal" style="color:#0067a7;">Confirmar contraseña nueva</label>
              <input type="password" id="password-confirmar" class="form-control" placeholder="Repite la contraseña nueva" />
              <span class="error" id="error-password-confirmar"></span>
            </div>

            <button type="submit" class="btn w-100 mt-2 btn-appet">Actualizar perfil</button>

          </form>
        </div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/perfil.js"></script>
</body>
</html>
