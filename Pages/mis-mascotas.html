<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APPET - Mis mascotas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/mis-mascotas.css" />
</head>
<body>

  <!-- layout principal: sidebar + contenido lado a lado -->
  <div class="layout">

    <!-- sidebar de navegación -->
    <aside class="sidebar">
      <div class="sidebar-usuario">
        <div class="avatar"><i class="fa-solid fa-user"></i></div>
        <span class="usuario-nombre">Bienvenido</span>
      </div>
      <hr class="divisor" />
      <!-- links de navegación, "activo" marca la página actual -->
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <i class="fa-solid fa-house"></i> Inicio
        </a>
        <a href="perfil.html" class="nav-item">
          <i class="fa-solid fa-circle-user"></i> Perfil
        </a>
        <a href="mis-mascotas.html" class="nav-item activo">
          <i class="fa-solid fa-paw"></i> Mis mascotas
        </a>
        <a href="registrar-mascota.html" class="nav-item">
          <i class="fa-solid fa-plus"></i> Registrar mascota
        </a>
      </nav>
      <!-- botón de cerrar sesión al fondo -->
      <div class="sidebar-footer">
        <button class="btn-logout" id="btn-logout">
          <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
        </button>
      </div>
    </aside>

    <!-- contenido de la página -->
    <main class="contenido">

      <div class="encabezado">
        <h1>Mis mascotas</h1>
      </div>

      <!-- tarjetas de ejemplo — cuando se conecte React y Express
           estas se generarán con los datos reales del usuario -->
      <div class="grid-mascotas">

        <!-- tarjeta mascota 1 -->
        <div class="tarjeta-mascota">
          <!-- foto placeholder hasta que haya imagen real -->
          <div class="foto-mascota">
            <i class="fa-solid fa-paw"></i>
          </div>
          <div class="info-mascota">
            <h2 class="nombre-mascota">Max</h2>
            <div class="datos">
              <span class="dato-label">Raza:</span>
              <span class="dato-valor">Golden Retriever</span>
              <span class="dato-label">Edad:</span>
              <span class="dato-valor">3 años</span>
              <span class="dato-label">Especie:</span>
              <span class="dato-valor">Perro</span>
              <span class="dato-label">Sexo:</span>
              <span class="dato-valor">Macho</span>
            </div>
            <div class="acciones">
              <button class="btn-editar">
                <i class="fa-solid fa-pen"></i> Editar
              </button>
              <button class="btn-eliminar">
                <i class="fa-solid fa-trash"></i> Eliminar
              </button>
            </div>
          </div>
        </div>

        <!-- tarjeta mascota 2 -->
        <div class="tarjeta-mascota">
          <div class="foto-mascota">
            <i class="fa-solid fa-paw"></i>
          </div>
          <div class="info-mascota">
            <h2 class="nombre-mascota">Kira</h2>
            <div class="datos">
              <span class="dato-label">Raza:</span>
              <span class="dato-valor">French Poodle</span>
              <span class="dato-label">Edad:</span>
              <span class="dato-valor">2 años</span>
              <span class="dato-label">Especie:</span>
              <span class="dato-valor">Perro</span>
              <span class="dato-label">Sexo:</span>
              <span class="dato-valor">Hembra</span>
            </div>
            <div class="acciones">
              <button class="btn-editar">
                <i class="fa-solid fa-pen"></i> Editar
              </button>
              <button class="btn-eliminar">
                <i class="fa-solid fa-trash"></i> Eliminar
              </button>
            </div>
          </div>
        </div>

      </div>

    </main>
  </div>

  <script src="../js/mis-mascotas.js"></script>
</body>
</html>
