<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APPET - Crear jornada</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>

  <!-- layout principal: sidebar + contenido -->
  <div class="layout">

    <!-- menú lateral del administrador -->
    <aside class="sidebar">

      <div class="sidebar-usuario">
        <div class="avatar">
          <i class="fa-solid fa-user-shield"></i>
        </div>
        <span class="usuario-nombre">Administrador</span>
      </div>

      <hr class="divisor" />

      <!-- opciones de navegación -->
      <nav class="sidebar-nav">
        <a href="admin.html" class="nav-item">
          <i class="fa-solid fa-list-check"></i> Solicitudes
        </a>

        <a href="crear-jornada.html" class="nav-item activo">
          <i class="fa-solid fa-calendar-plus"></i> Crear jornada
        </a>
      </nav>

      <!-- botón para cerrar la sesión -->
      <div class="sidebar-footer">
        <button id="btn-logout" class="btn-logout">
          <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
        </button>
      </div>

    </aside>

    <!-- contenido de la página -->
    <main class="contenido">

      <div class="card card-jornada border-0 shadow-sm rounded-4 mx-auto">

        <div class="card-body p-5">

          <h1 class="titulo-seccion text-center fs-4 fw-bold mb-5">
            Crear jornada
          </h1>

          <!-- formulario para registrar una nueva jornada -->
          <form id="form-jornada" class="d-flex flex-column gap-3">

            <div>
              <label for="tipo" class="form-label fw-normal label-admin">
                Tipo de servicio
              </label>

              <select id="tipo" class="form-select">
                <option value="">Selecciona el tipo</option>
                <option value="vacunacion">Vacunación</option>
                <option value="esterilizacion">Esterilización</option>
              </select>
            </div>

            <div>
              <label for="ciudad" class="form-label fw-normal label-admin">
                Ciudad
              </label>

              <input
                type="text"
                id="ciudad"
                class="form-control"
                placeholder="Ej: Tunja" />
            </div>

            <div>
              <label for="lugar" class="form-label fw-normal label-admin">
                Lugar
              </label>

              <input
                type="text"
                id="lugar"
                class="form-control"
                placeholder="Ej: Parque principal" />
            </div>

            <div>
              <label for="fecha" class="form-label fw-normal label-admin">
                Fecha
              </label>

              <input
                type="date"
                id="fecha"
                class="form-control" />
            </div>

            <!-- mantiene las horas en la misma fila -->
            <div class="row g-2">

              <div class="col-6">
                <label for="hora-inicio" class="form-label fw-normal label-admin">
                  Hora inicio
                </label>

                <input
                  type="time"
                  id="hora-inicio"
                  class="form-control" />
              </div>

              <div class="col-6">
                <label for="hora-fin" class="form-label fw-normal label-admin">
                  Hora fin
                </label>

                <input
                  type="time"
                  id="hora-fin"
                  class="form-control" />
              </div>

            </div>

            <button type="submit" class="btn btn-appet mt-2">
              <i class="fa-solid fa-floppy-disk"></i> Guardar jornada
            </button>

          </form>

        </div>

      </div>

    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/crear-jornada.js"></script>

</body>
</html>
