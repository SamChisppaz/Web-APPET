<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APPET - Registrar mascota</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/registrar-mascota.css" />
</head>
<body>

  <!-- layout principal: sidebar + contenido lado a lado -->
  <div class="layout">

    <!-- sidebar de navegacion -->
    <aside class="sidebar">

      <!-- usuario en la parte de arriba -->
      <div class="sidebar-usuario">
        <div class="avatar">
          <i class="fa-solid fa-user"></i>
        </div>
        <span class="usuario-nombre">Bienvenido</span>
      </div>

      <hr class="divisor" />

      <!-- links de navegación, "activo" marca la página actual -->
      <nav class="sidebar-nav">

        <a href="dashboard.html" class="nav-item">
          <i class="fa-solid fa-house"></i> Inicio
        </a>

        <a href="perfil.html" class="nav-item">
          <i class="fa-solid fa-circle-user"></i> Perfil
        </a>

        <a href="mis-mascotas.html" class="nav-item">
          <i class="fa-solid fa-paw"></i> Mis mascotas
        </a>

        <a href="registrar-mascota.html" class="nav-item activo">
          <i class="fa-solid fa-plus"></i> Registrar mascota
        </a>

      </nav>

      <!-- botón de cerrar sesión -->
      <div class="sidebar-footer">
        <button id="btn-logout" class="btn-logout">
          <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
        </button>
      </div>

    </aside>

    <!-- contenido de la página -->
    <main class="contenido">

      <!-- tarjeta centrada con el formulario -->
      <div class="card card-mascota border-0 shadow-sm rounded-4 mx-auto">

        <div class="card-body p-5">

          <h1 class="fw-bold mb-5 titulo fs-4 text-center">
            Registrar mascota
          </h1>

          <!-- novalidate desactiva la validación del navegador, la validación la hace registrar-mascota.js -->
          <form id="form-mascota" class="d-flex flex-column gap-3" novalidate>

            <div>

              <label for="nombre" class="form-label fw-normal label-mascota">
                Nombre
              </label>

              <input
                type="text"
                id="nombre"
                class="form-control"
                placeholder="Nombre de tu mascota" />

              <!-- el js muestra aquí el mensaje de error -->
              <span class="error" id="error-nombre"></span>

            </div>

            <div>

              <label for="especie" class="form-label fw-normal label-mascota">
                Especie
              </label>

              <select id="especie" class="form-select">
                <option value="">Selecciona una especie</option>
                <option value="perro">🐶 Perro</option>
                <option value="gato">🐱 Gato</option>
              </select>

              <span class="error" id="error-especie"></span>

            </div>

            <div>

              <label for="raza" class="form-label fw-normal label-mascota">
                Raza
              </label>

              <input
                type="text"
                id="raza"
                class="form-control"
                placeholder="Raza de tu mascota" />

              <span class="error" id="error-raza"></span>

            </div>

            <!-- la edad se divide en número y unidad -->
            <div>

              <label class="form-label fw-normal label-mascota">
                Edad
              </label>

              <div class="d-flex gap-2">

                <input
                  type="number"
                  id="edad"
                  class="form-control"
                  placeholder="Ej: 3"
                  min="0"
                  max="30" />

                <select id="unidad-edad" class="form-select unidad-edad">
                  <option value="anos">Años</option>
                  <option value="meses">Meses</option>
                </select>

              </div>

              <span class="error" id="error-edad"></span>

            </div>

            <div>

              <label for="sexo" class="form-label fw-normal label-mascota">
                Sexo
              </label>

              <select id="sexo" class="form-select">
                <option value="">Selecciona el sexo</option>
                <option value="macho">Macho</option>
                <option value="hembra">Hembra</option>
              </select>

              <span class="error" id="error-sexo"></span>

            </div>

            <button type="submit" class="btn btn-appet w-100 mt-2">
              Registrar mascota
            </button>

          </form>

        </div>

      </div>

    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/registrar-mascota.js"></script>

</body>
</html>
