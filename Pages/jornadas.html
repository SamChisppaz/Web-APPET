<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APPET - Jornadas disponibles</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/jornadas.css" />
</head>
<body>

  <div class="layout">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
      <div class="sidebar-usuario">
        <div class="avatar"><i class="fa-solid fa-user"></i></div>
        <span class="usuario-nombre">Bienvenido</span>
      </div>
      <hr class="divisor" />
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item activo">
          <i class="fa-solid fa-house"></i> Inicio
        </a>
        <a href="perfil.html" class="nav-item">
          <i class="fa-solid fa-circle-user"></i> Perfil
        </a>
        <a href="mis-mascotas.html" class="nav-item">
          <i class="fa-solid fa-paw"></i> Mis mascotas
        </a>
        <a href="registrar-mascota.html" class="nav-item">
          <i class="fa-solid fa-plus"></i> Registrar mascota
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" id="btn-logout">
          <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
        </button>
      </div>
    </aside>

    <!-- ===== CONTENIDO ===== -->
    <main class="contenido">

      <!-- Enlace para volver al dashboard -->
      <a href="dashboard.html" class="btn-volver">
        <i class="fa-solid fa-chevron-left"></i> Volver a servicios
      </a>

      <!-- El título cambia según el tipo (vacunación o esterilización) -->
      <h1 id="titulo-pagina">Jornadas disponibles</h1>

      <!-- Aviso informativo -->
      <div class="aviso">
        <i class="fa-solid fa-circle-info"></i>
        <span id="texto-aviso">Recuerda traer el carnet de vacunación si tu mascota ya tiene vacunas aplicadas.</span>
      </div>

      <!--
        Lista de jornadas.
        El JS llena este contenedor con las tarjetas o con el mensaje
        de "no hay jornadas" según los datos disponibles.
        Cuando haya backend, se reemplaza el array de datos fijos
        por un fetch() a la API.
      -->
      <div id="lista-jornadas"></div>

    </main>
  </div>

  <script src="../js/jornadas.js"></script>
</body>
</html>
