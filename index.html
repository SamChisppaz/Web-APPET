<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APPET - Iniciar Sesión</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Estilos propios de APPET -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Contenedor que centra la tarjeta en pantalla -->
  <main class="pagina">

    <!-- Tarjeta dividida en panel izquierdo y derecho -->
    <div class="tarjeta">

      <!-- Panel izquierdo: logo y descripción -->
      <div class="panel-izquierdo">
        <h1>Bienvenido a</h1>
        <img src="assets/images/Appet.svg" alt="Logo APPET" class="logo" />
        <p class="descripcion">
          Accede a los servicios gratuitos de esterilización,
          vacunación y adopción que la alcaldía tiene para ti.
        </p>
        <p class="eslogan">¡Cuidemos juntos a los más pequeños de la casa!</p>
      </div>

      <!-- Panel derecho: login y registro -->
      <div class="panel-derecho">
        <h2>Accede a tu cuenta</h2>

        <!-- Pestañas para cambiar entre Login y Registro -->
        <div class="pestanas">
          <button class="pestana activa" data-panel="login">Iniciar Sesión</button>
          <button class="pestana" data-panel="registro">Registrarse</button>
        </div>

        <!-- Formulario de Login -->
        <div id="login" class="formulario">
          <div class="campo">
            <label for="email" class="form-label">Correo Electrónico</label>
            <input type="email" id="email" class="form-control" placeholder="ejemplo@correo.com" />
            <span class="error" id="error-email"></span>
          </div>
          <div class="campo">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" id="password" class="form-control" placeholder="Tu contraseña" />
            <span class="error" id="error-password"></span>
          </div>
          <button class="btn btn-appet w-100" id="btn-login">Iniciar Sesión</button>
          <a href="#" class="link-olvide">¿Olvidaste tu contraseña?</a>
        </div>

        <!-- Formulario de Registro (oculto por defecto) -->
        <div id="registro" class="formulario oculto">
          <div class="row g-2">
            <div class="col-6 campo">
              <label for="nombre" class="form-label">Nombre</label>
              <input type="text" id="nombre" class="form-control" placeholder="Tu nombre" />
            </div>
            <div class="col-6 campo">
              <label for="apellido" class="form-label">Apellido</label>
              <input type="text" id="apellido" class="form-control" placeholder="Tu apellido" />
            </div>
          </div>
          <div class="campo">
            <label for="celular" class="form-label">Celular</label>
            <input type="tel" id="celular" class="form-control" placeholder="300 123 4567" />
          </div>
          <div class="campo">
            <label for="direccion" class="form-label">Dirección</label>
            <input type="text" id="direccion" class="form-control" placeholder="Calle 10 # 20-30" />
          </div>
          <div class="campo">
            <label for="email-reg" class="form-label">Correo Electrónico</label>
            <input type="email" id="email-reg" class="form-control" placeholder="ejemplo@correo.com" />
          </div>
          <div class="campo">
            <label for="password-reg" class="form-label">Contraseña</label>
            <input type="password" id="password-reg" class="form-control" placeholder="Mín. 8 caracteres, 1 mayúscula, 1 número" />
          </div>
          <button class="btn btn-appet w-100">Crear cuenta</button>
        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
